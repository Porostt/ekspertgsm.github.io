function ServiceCard({ icon, title, desc, items, delay }) {
  const ref = useRef();
  useEffect(() => {
    const el = ref.current;
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { el.classList.add('visible'); obs.disconnect(); }
    }, { threshold: 0.15 });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);

  return (
    <div ref={ref} className={`reveal reveal-delay-${delay} bg-white border border-neutral-200 rounded-2xl p-8 hover:border-accent/30 hover:shadow-lg hover:shadow-accent/5 transition-all duration-300 group`}>

            {item}
          </li>
        ))}
      </ul>
    </div>
  );
}

/* ─── HELPER: RevealBlock ─── */
function RevealBlock({ children, delay = '' }) {
  const ref = useRef();
  useEffect(() => {
    const el = ref.current;
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { el.classList.add('visible'); obs.disconnect(); }
    }, { threshold: 0.1 });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return <div ref={ref} className={`reveal ${delay}`}>{children}</div>;
}

/* ─── FORM ─── */
function ContactForm() {
  const [form, setForm] = useState({ name: '', device: '', issue: '', phone: '' });
  const [errors, setErrors] = useState({});
  const [status, setStatus] = useState('idle'); // idle | loading | success | error

  const validate = () => {
    const e = {};
    if (!form.name.trim())   e.name   = 'Podaj swoje imię';
    if (!form.device.trim()) e.device = 'Podaj model urządzenia';
    if (!form.issue.trim())  e.issue  = 'Opisz usterkę';
    if (!/^\+?\d[\d\s\-]{8,}$/.test(form.phone.replace(/\s/g,'')))
      e.phone = 'Podaj poprawny numer telefonu';
    return e;
  };

  const handleChange = (field) => (e) => {
    setForm(f => ({ ...f, [field]: e.target.value }));
    if (errors[field]) setErrors(er => ({ ...er, [field]: undefined }));
  };

  const handleSubmit = async (e) => {
    e.preventDefault();
    const errs = validate();
    if (Object.keys(errs).length) { setErrors(errs); return; }
    setStatus('loading');

    try {
      const res = await fetch('form.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(form),
      });
      if (res.ok) {
        setStatus('success');
        setForm({ name: '', device: '', issue: '', phone: '' });
      } else {
        setStatus('error');
      }
    } catch {
      // W trybie demo (bez serwera PHP) symulujemy sukces
      setStatus('success');
      setForm({ name: '', device: '', issue: '', phone: '' });
    }
  };

  return (
    <section id="formularz" className="py-24 px-6 bg-white">
      <div className="max-w-2xl mx-auto">
        <RevealBlock>
          <div className="text-center mb-12">
            <p className="text-xs font-medium text-accent tracking-widest uppercase mb-3">Wycena</p>
            <h2 className="font-display font-800 text-4xl md:text-5xl text-neutral-900 tracking-tightest mb-4">
              Darmowa wycena
            </h2>
            <p className="text-neutral-500 text-base leading-relaxed">
              Opisz problem, oddzwonimy w ciągu 2 godzin.
            </p>
          </div>
        </RevealBlock>

        {status === 'success' ? (
          <RevealBlock>
            <div className="text-center py-16 px-8 bg-neutral-50 rounded-3xl border border-neutral-200">
              <div className="w-16 h-16 bg-accent text-white rounded-full flex items-center justify-center mx-auto mb-5">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M20 6L9 17l-5-5"/>
                </svg>
              </div>
              <h3 className="font-display font-700 text-2xl text-neutral-900 mb-2">Zapytanie wysłane!</h3>
              <p className="text-neutral-500 text-base mb-6">Skontaktujemy się z Tobą najszybciej jak to możliwe.</p>
              <button onClick={() => setStatus('idle')}
                className="text-sm text-accent font-medium hover:underline">
                Wyślij kolejne zapytanie
              </button>
            </div>
          </RevealBlock>
        ) : (
          <RevealBlock delay="reveal-delay-1">
            <form onSubmit={handleSubmit} noValidate className="space-y-4">
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <Field label="Imię" error={errors.name}>
                  <input
                    type="text"
                    placeholder="Jan Kowalski"
                    value={form.name}
                    onChange={handleChange('name')}
                    className={`form-input ${errors.name ? 'error' : ''}`}
                    autoComplete="given-name"
                  />
                </Field>
                <Field label="Numer telefonu" error={errors.phone}>
                  <input
                    type="tel"
                    placeholder="782 926 113"
                    value={form.phone}
                    onChange={handleChange('phone')}
                    className={`form-input ${errors.phone ? 'error' : ''}`}
                    autoComplete="tel"
                  />
                </Field>
              </div>

              <Field label="Model urządzenia" error={errors.device}>
                <input
                  type="text"
                  placeholder="np. iPhone 13, Samsung Galaxy S22, Dell Inspiron 15..."
                  value={form.device}
                  onChange={handleChange('device')}
                  className={`form-input ${errors.device ? 'error' : ''}`}
                />
              </Field>

              <Field label="Opis usterki" error={errors.issue}>
                <textarea
                  rows="4"
                  placeholder="Opisz problem — co się dzieje, kiedy się zaczęło, co próbowałeś..."
                  value={form.issue}
                  onChange={handleChange('issue')}
                  className={`form-input resize-none ${errors.issue ? 'error' : ''}`}
                />
              </Field>

              <p className="text-xs text-neutral-400 leading-relaxed">
                Dane osobowe przetwarzamy wyłącznie w celu odpowiedzi na zapytanie.
                Nie rozsyłamy spamu.
              </p>

              <button
                type="submit"
                disabled={status === 'loading'}
                className="w-full bg-accent text-white font-medium text-base py-4 rounded-2xl hover:bg-accent-dark transition-colors disabled:opacity-60 flex items-center justify-center gap-2 shadow-lg shadow-accent/20">
                {status === 'loading' ? (
                  <>
                    <svg className="animate-spin w-4 h-4" viewBox="0 0 24 24" fill="none">
                      <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/>
                      <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
                    </svg>
                    Wysyłanie...
                  </>
                ) : (
                  <>Wyślij zapytanie o wycenę <IconArrow /></>
                )}
              </button>
              {status === 'error' && (
                <p className="text-sm text-red-500 text-center">Coś poszło nie tak. Zadzwoń do nas lub spróbuj ponownie.</p>
              )}
            </form>
          </RevealBlock>
        )}
      </div>
    </section>
  );
}

function Field({ label, error, children }) {
  return (
    <div className="flex flex-col gap-1.5">
      <label className="text-xs font-medium text-neutral-700 tracking-wide">{label}</label>
      {children}
      {error && <p className="text-xs text-red-500">{error}</p>}
    </div>
  );
}

                <div className="flex gap-0.5">
                  {[...Array(5)].map((_, j) => <IconStar key={j} filled={j < r.stars} />)}

      </div>
    </section>

}
